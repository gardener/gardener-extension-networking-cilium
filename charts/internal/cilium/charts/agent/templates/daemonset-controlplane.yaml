{{- $scope := $ }}
{{- if .Values.global.selfhostedShoot }}
{{- $scope := set $scope "role" "controlplane" }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cilium-controlplane
  namespace: {{ .Release.Namespace }}
  labels:
    node.gardener.cloud/critical-component: "true"
    gardener.cloud/role: system-component
    k8s-app: cilium
    app.kubernetes.io/part-of: cilium
    app.kubernetes.io/name: cilium-agent
spec:
{{- include "agent.daemonset-spec" $scope  | nindent 2 }}
{{- end }}
